<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>ProxyZero Dashboard</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Geist:wght@400;500;600&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "tertiary": "#ffb783",
                        "surface-dim": "#12131a",
                        "surface-bright": "#383941",
                        "on-tertiary-fixed": "#301400",
                        "surface-tint": "#c0c1ff",
                        "primary-fixed": "#e1e0ff",
                        "on-primary": "#1000a9",
                        "tertiary-container": "#d97721",
                        "surface": "#12131a",
                        "on-tertiary-container": "#452000",
                        "surface-container-lowest": "#0d0e15",
                        "surface-container-highest": "#33343c",
                        "inverse-primary": "#494bd6",
                        "secondary-fixed": "#acedff",
                        "on-tertiary": "#4f2500",
                        "on-error": "#690005",
                        "surface-variant": "#33343c",
                        "secondary-fixed-dim": "#4cd7f6",
                        "outline": "#908fa0",
                        "outline-variant": "#464554",
                        "primary-container": "#8083ff",
                        "surface-container": "#1e1f26",
                        "secondary": "#4cd7f6",
                        "surface-container-high": "#292931",
                        "primary": "#c0c1ff",
                        "background": "#12131a",
                        "on-surface": "#e3e1ec",
                        "on-secondary-fixed-variant": "#004e5c",
                        "on-secondary-container": "#00424e",
                        "surface-container-low": "#1a1b22",
                        "error": "#ffb4ab",
                        "on-primary-fixed-variant": "#2f2ebe",
                        "secondary-container": "#03b5d3",
                        "on-background": "#e3e1ec",
                        "tertiary-fixed": "#ffdcc5",
                        "inverse-on-surface": "#2f3038",
                        "tertiary-fixed-dim": "#ffb783",
                        "on-primary-container": "#0d0096",
                        "on-primary-fixed": "#07006c",
                        "on-secondary-fixed": "#001f26",
                        "on-tertiary-fixed-variant": "#703700",
                        "on-surface-variant": "#c7c4d7",
                        "error-container": "#93000a",
                        "on-secondary": "#003640",
                        "primary-fixed-dim": "#c0c1ff",
                        "on-error-container": "#ffdad6",
                        "inverse-surface": "#e3e1ec"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "md": "24px",
                        "xs": "4px",
                        "sm": "12px",
                        "xl": "64px",
                        "base": "8px",
                        "lg": "40px",
                        "gutter": "24px",
                        "margin": "32px"
                    },
                    "fontFamily": {
                        "headline-md": ["Inter"],
                        "body-sm": ["Inter"],
                        "headline-lg": ["Inter"],
                        "body-md": ["Inter"],
                        "label-sm": ["Geist"],
                        "headline-lg-mobile": ["Inter"],
                        "label-md": ["Geist"],
                        "body-lg": ["Inter"],
                        "display-lg": ["Inter"]
                    },
                    "fontSize": {
                        "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                        "body-sm": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                        "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                        "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "label-sm": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "500"}],
                        "headline-lg-mobile": ["28px", {"lineHeight": "36px", "fontWeight": "600"}],
                        "label-md": ["14px", {"lineHeight": "20px", "letterSpacing": "0.02em", "fontWeight": "500"}],
                        "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                        "display-lg": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700"}]
                    }
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .chart-gradient {
            background: linear-gradient(180deg, rgba(192, 193, 255, 0.1) 0%, rgba(192, 193, 255, 0) 100%);
        }
    </style>
</head>
<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col">
    <!-- TopNavBar -->
    <header class="bg-surface-container border-b border-outline-variant/10 sticky top-0 z-50">
        <div class="flex items-center w-full px-gutter h-16 max-w-7xl mx-auto justify-center">
            <div class="text-headline-md font-headline-md font-bold text-primary">ProxyZero</div>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden">
        <!-- Main Content -->
        <main class="flex-1 overflow-y-auto p-gutter lg:p-margin bg-background pb-20 md:pb-0">
            <div class="mx-auto space-y-gutter max-w-7xl">
                <!-- Monitoring Graph Section -->
                <section class="bg-surface-container-low border border-outline-variant/10 rounded-xl overflow-hidden">
                    <div class="px-md py-sm border-b border-outline-variant/10 flex justify-between items-center">
                        <div>
                            <h2 class="font-headline-md text-headline-md text-on-surface">Usage Statistics</h2>
                            <p class="font-label-sm text-label-sm text-on-surface-variant">Real-time API traffic monitoring across global clusters</p>
                        </div>
                        <div class="flex gap-xs">
                            <span id="live-indicator" class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full bg-secondary-container/20 text-secondary text-xs font-semibold">
                                <span class="w-1.5 h-1.5 rounded-full bg-secondary animate-pulse"></span>
                                Live Sync
                            </span>
                        </div>
                    </div>
                    <div class="p-md h-64 relative">
                        <!-- 16-Model Chart -->
                        <div id="model-chart" class="absolute inset-x-md bottom-md top-md flex items-end justify-between gap-2">
                            <!-- Chart bars will be inserted here -->
                        </div>
                        <div class="absolute inset-0 chart-gradient pointer-events-none"></div>
                        <div class="absolute inset-x-0 top-0 h-full flex flex-col justify-between py-md pointer-events-none opacity-10">
                            <div class="border-t border-on-surface"></div>
                            <div class="border-t border-on-surface"></div>
                            <div class="border-t border-on-surface"></div>
                            <div class="border-t border-on-surface"></div>
                        </div>
                    </div>
                </section>

                <!-- AI Models Cards Section -->
                <div id="models-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-gutter">
                    <!-- Model cards will be inserted here -->
                </div>

                <!-- Bottom Status Bar -->
                <section class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-md">
                    <div class="bg-surface-container-low p-md rounded-xl border border-outline-variant/10 flex items-center gap-md">
                        <div class="w-10 h-10 rounded-full bg-secondary/10 flex items-center justify-center text-secondary">
                            <span class="material-symbols-outlined">hub</span>
                        </div>
                        <div>
                            <div id="stat-total-requests" class="text-[24px] font-bold text-on-surface">0</div>
                            <div class="text-label-sm text-on-surface-variant">Total Requests</div>
                        </div>
                    </div>
                    <div class="bg-surface-container-low p-md rounded-xl border border-outline-variant/10 flex items-center gap-md">
                        <div class="w-10 h-10 rounded-full bg-primary/10 flex items-center justify-center text-primary">
                            <span class="material-symbols-outlined">speed</span>
                        </div>
                        <div>
                            <div id="stat-avg-latency" class="text-[24px] font-bold text-on-surface">0ms</div>
                            <div class="text-label-sm text-on-surface-variant">Avg Latency</div>
                        </div>
                    </div>
                    <div class="bg-surface-container-low p-md rounded-xl border border-outline-variant/10 flex items-center gap-md">
                        <div class="w-10 h-10 rounded-full bg-tertiary/10 flex items-center justify-center text-tertiary">
                            <span class="material-symbols-outlined">account_balance_wallet</span>
                        </div>
                        <div>
                            <div id="stat-tokens" class="text-[24px] font-bold text-on-surface">0</div>
                            <div class="text-label-sm text-on-surface-variant">Tokens Used</div>
                        </div>
                    </div>
                    <div class="bg-surface-container-low p-md rounded-xl border border-outline-variant/10 flex items-center gap-md">
                        <div class="w-10 h-10 rounded-full bg-error/10 flex items-center justify-center text-error">
                            <span class="material-symbols-outlined">warning</span>
                        </div>
                        <div>
                            <div id="stat-errors" class="text-[24px] font-bold text-on-surface">0</div>
                            <div class="text-label-sm text-on-surface-variant">Errors</div>
                        </div>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <!-- Mobile Bottom Navigation -->
    <nav class="md:hidden flex justify-around items-center bg-surface-container border-t border-outline-variant/10 h-16 fixed bottom-0 left-0 w-full z-50">
        <button class="flex flex-col items-center gap-1 text-primary">
            <span class="material-symbols-outlined">dashboard</span>
            <span class="text-[10px] font-medium">Dashboard</span>
        </button>
        <button class="flex flex-col items-center gap-1 text-on-surface-variant">
            <span class="material-symbols-outlined">router</span>
            <span class="text-[10px] font-medium">Proxies</span>
        </button>
        <button class="flex flex-col items-center gap-1 text-on-surface-variant">
            <span class="material-symbols-outlined">bar_chart</span>
            <span class="text-[10px] font-medium">Usage</span>
        </button>
        <button class="flex flex-col items-center gap-1 text-on-surface-variant">
            <span class="material-symbols-outlined">settings</span>
            <span class="text-[10px] font-medium">Settings</span>
        </button>
    </nav>

    <!-- Test Modal -->
    <div id="test-modal" class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="bg-surface-container border border-outline-variant/10 rounded-xl max-w-2xl w-full max-h-[90vh] overflow-y-auto">
            <div class="px-md py-sm border-b border-outline-variant/10 flex justify-between items-center">
                <h3 class="font-headline-md text-headline-md text-on-surface">Test Model: <span id="modal-model-name"></span></h3>
                <button id="modal-close" class="p-2 hover:bg-surface-variant rounded-lg transition-colors">
                    <span class="material-symbols-outlined text-on-surface-variant">close</span>
                </button>
            </div>
            <div class="p-md space-y-sm">
                <div>
                    <label class="block font-label-md text-label-md text-on-surface-variant mb-xs">Your Prompt</label>
                    <textarea id="test-prompt" class="w-full px-sm py-sm bg-surface-container-high border border-outline-variant/20 rounded-lg text-on-surface font-body-sm focus:border-primary focus:ring-1 focus:ring-primary outline-none resize-none" rows="4" placeholder="Hello, who are you?">Hello, who are you?</textarea>
                </div>
                <button id="test-submit" class="w-full py-2.5 rounded-lg bg-primary text-on-primary font-bold font-label-md hover:opacity-90 active:scale-95 transition-all">
                    Send Request
                </button>
                <div id="test-loading" class="hidden text-center text-on-surface-variant">
                    <span class="inline-block animate-spin material-symbols-outlined">progress_activity</span>
                    <span class="ml-2 font-body-sm">Sending request...</span>
                </div>
                <div id="test-response" class="hidden">
                    <label class="block font-label-md text-label-md text-on-surface-variant mb-xs">Response</label>
                    <div id="test-response-content" class="px-sm py-sm bg-surface-container-high border border-outline-variant/20 rounded-lg text-on-surface font-body-sm whitespace-pre-wrap max-h-96 overflow-y-auto"></div>
                </div>
                <div id="test-error" class="hidden px-sm py-sm bg-error-container/20 border border-error/20 rounded-lg text-error font-body-sm"></div>
            </div>
        </div>
    </div>

    <script>

    <script>
      // State
      let csrfToken = null;
      let pollInterval = 10000; // Start with 10s
      let pollTimer = null;
      let chartData = [];
      const MAX_CHART_POINTS = 16;

      // Fetch CSRF token
      async function fetchCSRFToken() {
        try {
          const res = await fetch('/api/csrf-token');
          const data = await res.json();
          csrfToken = data.token;
        } catch (err) {
          console.error('Failed to fetch CSRF token:', err);
        }
      }

      // Load models and render cards
      async function loadModels() {
        try {
          const res = await fetch('/v1/models');
          const data = await res.json();
          
          const grid = document.getElementById('models-grid');
          grid.innerHTML = '';
          
          for (const model of data.data) {
            const card = document.createElement('div');
            card.className = 'bg-gray-800 rounded-lg p-4 border border-gray-700 hover:border-purple-500 transition-colors';
            
            const isFree = model.verified_anonymous;
            const statusColor = isFree ? 'text-green-400' : 'text-yellow-400';
            const statusText = isFree ? 'Free' : 'API Key';
            
            card.innerHTML = `
              <div class="flex items-start justify-between mb-3">
                <div class="flex-1">
                  <h3 class="text-white font-medium mb-1 model-name">${escapeHtml(model.id)}</h3>
                  <div class="flex items-center gap-2 text-xs">
                    <span class="${statusColor}">${statusText}</span>
                    <span class="text-gray-500">•</span>
                    <span class="text-gray-400">${model.context_length.toLocaleString()} ctx</span>
                  </div>
                </div>
                <label class="relative inline-flex items-center cursor-pointer">
                  <input type="checkbox" class="sr-only peer model-toggle" data-model="${escapeHtml(model.id)}" checked>
                  <div class="w-11 h-6 bg-gray-700 peer-focus:outline-none peer-focus:ring-2 peer-focus:ring-purple-500 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-purple-600"></div>
                </label>
              </div>
              
              <div class="flex items-center justify-between text-xs">
                <div class="flex items-center gap-4">
                  <div>
                    <span class="text-gray-500">Requests:</span>
                    <span class="text-white model-requests">0</span>
                  </div>
                  <div>
                    <span class="text-gray-500">Latency:</span>
                    <span class="text-cyan-400 model-latency">0ms</span>
                  </div>
                </div>
                ${!isFree ? `<button class="text-purple-400 hover:text-purple-300 transition-colors api-key-btn" data-model="${escapeHtml(model.id)}">
                  <span class="material-symbols-outlined text-sm">key</span>
                </button>` : ''}
              </div>
            `;
            
            grid.appendChild(card);
          }
          
          // Attach event listeners
          document.querySelectorAll('.api-key-btn').forEach(btn => {
            btn.addEventListener('click', () => openAPIKeyModal(btn.dataset.model));
          });
          
        } catch (err) {
          console.error('Failed to load models:', err);
        }
      }

      // Update statistics
      async function updateStats() {
        try {
          const res = await fetch('/api/stats');
          const stats = await res.json();
          
          // Update bottom status bar
          document.getElementById('total-requests').textContent = stats.total_requests.toLocaleString();
          document.getElementById('avg-latency').textContent = Math.round(stats.avg_latency_ms) + 'ms';
          document.getElementById('total-tokens').textContent = stats.total_tokens.toLocaleString();
          document.getElementById('total-errors').textContent = stats.total_errors.toLocaleString();
          
          // Update per-model stats
          for (const [modelId, modelStats] of Object.entries(stats.per_model)) {
            const cards = document.querySelectorAll('.model-name');
            for (const nameEl of cards) {
              if (nameEl.textContent === modelId) {
                const card = nameEl.closest('.bg-gray-800');
                card.querySelector('.model-requests').textContent = modelStats.requests.toLocaleString();
                card.querySelector('.model-latency').textContent = Math.round(modelStats.avg_latency_ms) + 'ms';
              }
            }
          }
          
          // Update chart data
          const tokensPerMin = stats.tokens_per_minute || 0;
          chartData.push(tokensPerMin);
          if (chartData.length > MAX_CHART_POINTS) {
            chartData.shift();
          }
          renderChart();
          
          // Adaptive polling
          updatePollInterval(tokensPerMin);
          
        } catch (err) {
          console.error('Failed to update stats:', err);
        }
      }

      // Render 16-model vertical chart
      function renderChart() {
        const canvas = document.getElementById('chart');
        const ctx = canvas.getContext('2d');
        const width = canvas.width;
        const height = canvas.height;
        
        ctx.clearRect(0, 0, width, height);
        
        if (chartData.length === 0) return;
        
        const max = Math.max(...chartData, 1);
        const barWidth = width / MAX_CHART_POINTS;
        
        chartData.forEach((value, i) => {
          const barHeight = (value / max) * height;
          const x = i * barWidth;
          const y = height - barHeight;
          
          // Gradient from purple to cyan
          const gradient = ctx.createLinearGradient(0, y, 0, height);
          gradient.addColorStop(0, '#c0c1ff');
          gradient.addColorStop(1, '#4cd7f6');
          
          ctx.fillStyle = gradient;
          ctx.fillRect(x, y, barWidth - 2, barHeight);
        });
      }

      // Adaptive polling based on tokens/min
      function updatePollInterval(tokensPerMin) {
        let newInterval;
        if (tokensPerMin > 1000) {
          newInterval = 5000; // High activity: 5s
        } else if (tokensPerMin > 100) {
          newInterval = 10000; // Medium activity: 10s
        } else {
          newInterval = 30000; // Low activity: 30s
        }
        
        if (newInterval !== pollInterval) {
          pollInterval = newInterval;
          clearInterval(pollTimer);
          pollTimer = setInterval(updateStats, pollInterval);
        }
      }

      // Test modal
      function openTestModal() {
        document.getElementById('test-modal').classList.remove('hidden');
      }

      function closeTestModal() {
        document.getElementById('test-modal').classList.add('hidden');
        document.getElementById('test-result').textContent = '';
      }

      async function runTest() {
        const model = document.getElementById('test-model').value;
        const prompt = document.getElementById('test-prompt').value;
        const resultEl = document.getElementById('test-result');
        
        if (!prompt.trim()) {
          resultEl.textContent = 'Please enter a prompt';
          return;
        }
        
        resultEl.textContent = 'Testing...';
        
        try {
          const res = await fetch('/v1/chat/completions', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'X-CSRF-Token': csrfToken
            },
            body: JSON.stringify({
              model: model,
              messages: [{ role: 'user', content: prompt }]
            })
          });
          
          const data = await res.json();
          
          if (res.ok && data.choices && data.choices[0]) {
            resultEl.textContent = data.choices[0].message.content;
          } else {
            resultEl.textContent = 'Error: ' + (data.error?.message || 'Unknown error');
          }
        } catch (err) {
          resultEl.textContent = 'Request failed: ' + err.message;
        }
      }

      // API Key modal
      function openAPIKeyModal(modelId) {
        document.getElementById('api-key-modal').classList.remove('hidden');
        document.getElementById('api-key-model').textContent = modelId;
        document.getElementById('api-key-model').dataset.model = modelId;
        document.getElementById('api-key-input').value = '';
        
        // Check if key exists
        fetch(`/api/models/${encodeURIComponent(modelId)}/key`)
          .then(res => res.json())
          .then(data => {
            if (data.exists) {
              document.getElementById('api-key-input').placeholder = '••••••••••••••••';
            }
          });
      }

      function closeAPIKeyModal() {
        document.getElementById('api-key-modal').classList.add('hidden');
      }

      async function saveAPIKey() {
        const modelId = document.getElementById('api-key-model').dataset.model;
        const key = document.getElementById('api-key-input').value;
        
        if (!key.trim()) {
          alert('Please enter an API key');
          return;
        }
        
        try {
          const res = await fetch(`/api/models/${encodeURIComponent(modelId)}/key`, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'X-CSRF-Token': csrfToken
            },
            body: JSON.stringify({ key: key })
          });
          
          if (res.ok) {
            closeAPIKeyModal();
            alert('API key saved successfully');
          } else {
            alert('Failed to save API key');
          }
        } catch (err) {
          alert('Request failed: ' + err.message);
        }
      }

      async function deleteAPIKey() {
        const modelId = document.getElementById('api-key-model').dataset.model;
        
        if (!confirm('Delete API key for ' + modelId + '?')) return;
        
        try {
          const res = await fetch(`/api/models/${encodeURIComponent(modelId)}/key`, {
            method: 'DELETE',
            headers: {
              'X-CSRF-Token': csrfToken
            }
          });
          
          if (res.ok) {
            closeAPIKeyModal();
            alert('API key deleted successfully');
          } else {
            alert('Failed to delete API key');
          }
        } catch (err) {
          alert('Request failed: ' + err.message);
        }
      }

      // XSS protection
      function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
      }

      // Initialize
      async function init() {
        await fetchCSRFToken();
        await loadModels();
        await updateStats();
        pollTimer = setInterval(updateStats, pollInterval);
      }

      init();
    </script>
  </body>
</html>
