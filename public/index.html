<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>ProxyZero Dashboard</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Geist:wght@400;500;600&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "tertiary": "#ffb783",
                        "surface-dim": "#12131a",
                        "surface-bright": "#383941",
                        "on-tertiary-fixed": "#301400",
                        "surface-tint": "#c0c1ff",
                        "primary-fixed": "#e1e0ff",
                        "on-primary": "#1000a9",
                        "tertiary-container": "#d97721",
                        "surface": "#12131a",
                        "on-tertiary-container": "#452000",
                        "surface-container-lowest": "#0d0e15",
                        "surface-container-highest": "#33343c",
                        "inverse-primary": "#494bd6",
                        "secondary-fixed": "#acedff",
                        "on-tertiary": "#4f2500",
                        "on-error": "#690005",
                        "surface-variant": "#33343c",
                        "secondary-fixed-dim": "#4cd7f6",
                        "outline": "#908fa0",
                        "outline-variant": "#464554",
                        "primary-container": "#8083ff",
                        "surface-container": "#1e1f26",
                        "secondary": "#4cd7f6",
                        "surface-container-high": "#292931",
                        "primary": "#c0c1ff",
                        "background": "#12131a",
                        "on-surface": "#e3e1ec",
                        "on-secondary-fixed-variant": "#004e5c",
                        "on-secondary-container": "#00424e",
                        "surface-container-low": "#1a1b22",
                        "error": "#ffb4ab",
                        "on-primary-fixed-variant": "#2f2ebe",
                        "secondary-container": "#03b5d3",
                        "on-background": "#e3e1ec",
                        "tertiary-fixed": "#ffdcc5",
                        "inverse-on-surface": "#2f3038",
                        "tertiary-fixed-dim": "#ffb783",
                        "on-primary-container": "#0d0096",
                        "on-primary-fixed": "#07006c",
                        "on-secondary-fixed": "#001f26",
                        "on-tertiary-fixed-variant": "#703700",
                        "on-surface-variant": "#c7c4d7",
                        "error-container": "#93000a",
                        "on-secondary": "#003640",
                        "primary-fixed-dim": "#c0c1ff",
                        "on-error-container": "#ffdad6",
                        "inverse-surface": "#e3e1ec"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "md": "24px",
                        "xs": "4px",
                        "sm": "12px",
                        "xl": "64px",
                        "base": "8px",
                        "lg": "40px",
                        "gutter": "24px",
                        "margin": "32px"
                    },
                    "fontFamily": {
                        "headline-md": ["Inter"],
                        "body-sm": ["Inter"],
                        "headline-lg": ["Inter"],
                        "body-md": ["Inter"],
                        "label-sm": ["Geist"],
                        "headline-lg-mobile": ["Inter"],
                        "label-md": ["Geist"],
                        "body-lg": ["Inter"],
                        "display-lg": ["Inter"]
                    },
                    "fontSize": {
                        "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                        "body-sm": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                        "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                        "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "label-sm": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "500"}],
                        "headline-lg-mobile": ["28px", {"lineHeight": "36px", "fontWeight": "600"}],
                        "label-md": ["14px", {"lineHeight": "20px", "letterSpacing": "0.02em", "fontWeight": "500"}],
                        "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                        "display-lg": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700"}]
                    }
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .chart-gradient {
            background: linear-gradient(180deg, rgba(192, 193, 255, 0.1) 0%, rgba(192, 193, 255, 0) 100%);
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .animate-spin {
            animation: spin 1s linear infinite;
        }
        @keyframes fade-in {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fade-in 0.3s ease-out;
        }
    </style>
</head>
<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col">
    <!-- TopNavBar Implementation -->
    <header class="bg-surface-container border-b border-outline-variant/10 docked full-width top-0 z-50">
        <div class="flex items-center w-full px-gutter h-16 max-w-7xl mx-auto justify-center">
            <div class="text-headline-md font-headline-md font-bold text-primary">ProxyZero</div>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden">
        <!-- Main Content -->
        <main class="flex-1 overflow-y-auto p-gutter lg:p-margin bg-background">
            <div class="mx-auto space-y-gutter max-w-7xl">
                <!-- Monitoring Graph Section -->
                <section class="bg-surface-container-low border border-outline-variant/10 rounded-xl overflow-hidden">
                    <div class="px-md py-sm border-b border-outline-variant/10 flex justify-between items-center">
                        <div>
                            <h2 class="font-headline-md text-headline-md text-on-surface">Usage Statistics</h2>
                            <p class="font-label-sm text-label-sm text-on-surface-variant">Real-time API traffic monitoring across global clusters</p>
                        </div>
                        <div class="flex gap-xs">
                            <span class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full bg-secondary-container/20 text-secondary text-xs font-semibold">
                                <span class="w-1.5 h-1.5 rounded-full bg-secondary animate-pulse"></span>
                                Live Sync
                            </span>
                        </div>
                    </div>
                    <div class="p-md h-64 relative">
                        <!-- Chart Container -->
                        <canvas id="chart" width="800" height="200" class="absolute inset-x-md bottom-md top-md"></canvas>
                        <div class="absolute inset-0 chart-gradient pointer-events-none"></div>
                        <div class="absolute inset-x-0 top-0 h-full flex flex-col justify-between py-md pointer-events-none opacity-10">
                            <div class="border-t border-on-surface"></div>
                            <div class="border-t border-on-surface"></div>
                            <div class="border-t border-on-surface"></div>
                            <div class="border-t border-on-surface"></div>
                        </div>
                    </div>
                </section>

                <!-- AI Models Cards Section -->
                <div id="models-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-gutter">
                    <!-- Cards will be dynamically loaded here -->
                </div>

                <!-- Bottom Status Bar -->
                <section class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-md">
                    <div class="bg-surface-container-low p-md rounded-xl border border-outline-variant/10 flex items-center gap-md">
                        <div class="w-10 h-10 rounded-full bg-secondary/10 flex items-center justify-center text-secondary">
                            <span class="material-symbols-outlined">hub</span>
                        </div>
                        <div>
                            <div id="total-requests" class="text-[24px] font-bold text-on-surface">0</div>
                            <div class="text-label-sm text-on-surface-variant">Total Requests</div>
                        </div>
                    </div>
                    <div class="bg-surface-container-low p-md rounded-xl border border-outline-variant/10 flex items-center gap-md">
                        <div class="w-10 h-10 rounded-full bg-primary/10 flex items-center justify-center text-primary">
                            <span class="material-symbols-outlined">speed</span>
                        </div>
                        <div>
                            <div id="avg-latency" class="text-[24px] font-bold text-on-surface">0ms</div>
                            <div class="text-label-sm text-on-surface-variant">Avg Latency</div>
                        </div>
                    </div>
                    <div class="bg-surface-container-low p-md rounded-xl border border-outline-variant/10 flex items-center gap-md">
                        <div class="w-10 h-10 rounded-full bg-tertiary/10 flex items-center justify-center text-tertiary">
                            <span class="material-symbols-outlined">account_balance_wallet</span>
                        </div>
                        <div>
                            <div id="total-tokens" class="text-[24px] font-bold text-on-surface">0</div>
                            <div class="text-label-sm text-on-surface-variant">Tokens Used</div>
                        </div>
                    </div>
                    <div class="bg-surface-container-low p-md rounded-xl border border-outline-variant/10 flex items-center gap-md">
                        <div class="w-10 h-10 rounded-full bg-error/10 flex items-center justify-center text-error">
                            <span class="material-symbols-outlined">warning</span>
                        </div>
                        <div>
                            <div id="total-errors" class="text-[24px] font-bold text-on-surface">0</div>
                            <div class="text-label-sm text-on-surface-variant">Errors</div>
                        </div>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <!-- Mobile Bottom Navigation -->
    <nav class="md:hidden flex justify-around items-center bg-surface-container border-t border-outline-variant/10 h-16 fixed bottom-0 left-0 w-full z-50">
        <button class="flex flex-col items-center gap-1 text-primary">
            <span class="material-symbols-outlined">dashboard</span>
            <span class="text-[10px] font-medium">Dashboard</span>
        </button>
        <button class="flex flex-col items-center gap-1 text-on-surface-variant">
            <span class="material-symbols-outlined">router</span>
            <span class="text-[10px] font-medium">Proxies</span>
        </button>
        <button class="flex flex-col items-center gap-1 text-on-surface-variant">
            <span class="material-symbols-outlined">bar_chart</span>
            <span class="text-[10px] font-medium">Usage</span>
        </button>
        <button class="flex flex-col items-center gap-1 text-on-surface-variant">
            <span class="material-symbols-outlined">settings</span>
            <span class="text-[10px] font-medium">Settings</span>
        </button>
    </nav>

    <!-- Test Modal (Hidden by default) -->
    <div id="test-modal" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-gutter">
        <div class="absolute inset-0 bg-background/80 backdrop-blur-md" onclick="closeTestModal()"></div>
        <div class="relative w-full max-w-3xl bg-surface-container border border-outline-variant/20 rounded-xl shadow-2xl overflow-hidden flex flex-col">
            <div class="px-md py-md border-b border-outline-variant/10 flex items-center justify-between">
                <div class="flex items-center gap-sm">
                    <span class="material-symbols-outlined text-tertiary-container">settings_input_component</span>
                    <h2 class="text-headline-md font-headline-md text-on-surface">Test Model</h2>
                </div>
                <button onclick="closeTestModal()" class="p-1 text-on-surface-variant hover:text-on-surface transition-colors">
                    <span class="material-symbols-outlined">close</span>
                </button>
            </div>
            <div class="p-md space-y-md">
                <div class="space-y-xs">
                    <label class="text-label-md font-label-md text-on-surface">Model</label>
                    <input id="test-model" class="w-full bg-surface-container-low border border-outline-variant/20 rounded-lg px-sm py-2 text-on-surface focus:outline-none focus:border-primary" type="text" readonly/>
                </div>
                <div class="space-y-xs">
                    <label class="text-label-md font-label-md text-on-surface">Prompt</label>
                    <textarea id="test-prompt" class="w-full bg-surface-container-low border border-outline-variant/20 rounded-lg px-sm py-2 text-on-surface focus:outline-none focus:border-primary" rows="3" placeholder="Enter your test prompt..."></textarea>
                </div>
                <div class="space-y-xs">
                    <label class="text-label-md font-label-md text-on-surface">Response</label>
                    <div id="test-result" class="w-full bg-surface-container-low border border-outline-variant/20 rounded-lg px-sm py-2 text-on-surface min-h-[100px] max-h-[300px] overflow-y-auto"></div>
                </div>
                <div class="flex justify-end gap-sm pt-md border-t border-outline-variant/10">
                    <button onclick="closeTestModal()" class="px-xl py-2.5 text-on-surface-variant font-bold text-label-md hover:text-on-surface transition-colors">Cancel</button>
                    <button onclick="runTest()" class="px-xl py-2.5 bg-primary text-on-primary rounded-lg font-bold text-label-md hover:opacity-90 active:scale-95 transition-all">Run Test</button>
                </div>
            </div>
        </div>
    </div>

    <!-- API Key Modal (Hidden by default) -->
    <div id="api-key-modal" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-gutter">
        <div class="absolute inset-0 bg-background/80 backdrop-blur-md" onclick="closeAPIKeyModal()"></div>
        <div class="relative w-full max-w-xl bg-surface-container border border-outline-variant/20 rounded-xl shadow-2xl overflow-hidden flex flex-col">
            <div class="px-md py-md border-b border-outline-variant/10 flex items-center justify-between">
                <div class="flex items-center gap-sm">
                    <span class="material-symbols-outlined text-primary">vpn_key</span>
                    <h2 class="text-headline-md font-headline-md text-on-surface">API KEY</h2>
                </div>
                <button onclick="closeAPIKeyModal()" class="p-1 text-on-surface-variant hover:text-on-surface transition-colors">
                    <span class="material-symbols-outlined">close</span>
                </button>
            </div>
            <div class="p-md space-y-md">
                <div class="space-y-xs">
                    <label class="text-label-md font-label-md text-on-surface">Name</label>
                    <input id="api-key-name" class="w-full bg-surface-container-low border border-outline-variant/20 rounded-lg px-sm py-2 text-on-surface focus:outline-none focus:border-primary" placeholder="Production Key" type="text"/>
                </div>
                <div class="space-y-xs">
                    <label class="text-label-md font-label-md text-on-surface">API Key</label>
                    <div class="flex gap-sm">
                        <input id="api-key-input" class="flex-1 bg-surface-container-low border border-outline-variant/20 rounded-lg px-sm py-2 text-on-surface focus:outline-none focus:border-primary" type="password" placeholder="Enter API key..."/>
                        <button onclick="checkAPIKey()" class="px-md py-2 bg-surface-container-high border border-outline-variant/20 rounded-lg text-on-surface font-label-md hover:bg-surface-variant transition-colors">Check</button>
                    </div>
                </div>
                <div class="space-y-xs">
                    <label class="text-label-md font-label-md text-on-surface">Priority</label>
                    <input id="api-key-priority" class="w-full bg-surface-container-low border border-outline-variant/20 rounded-lg px-sm py-2 text-on-surface focus:outline-none focus:border-primary" type="number" value="1"/>
                </div>
                <div class="flex justify-end gap-sm mt-lg pt-md border-t border-outline-variant/10">
                    <button onclick="closeAPIKeyModal()" class="px-xl py-2.5 text-on-surface-variant font-bold text-label-md hover:text-on-surface transition-colors">Cancel</button>
                    <button onclick="saveAPIKey()" class="px-xl py-2.5 bg-primary text-on-primary rounded-lg font-bold text-label-md hover:opacity-90 active:scale-95 transition-all">Save</button>
                </div>
            </div>
        </div>
    </div>

    <script>
      // State
      let csrfToken = null;
      let pollInterval = 10000;
      let pollTimer = null;
      let chartData = [];
      const MAX_CHART_POINTS = 16;
      let disabledModels = new Set(JSON.parse(localStorage.getItem('disabledModels') || '[]'));

      // Fetch CSRF token
      async function fetchCSRFToken() {
        try {
          const res = await fetch('/api/csrf-token');
          const data = await res.json();
          csrfToken = data.token;
        } catch (err) {
          console.error('Failed to fetch CSRF token:', err);
        }
      }

      // Load models and render cards
      async function loadModels() {
        try {
          const res = await fetch('/v1/models');
          const data = await res.json();

          const grid = document.getElementById('models-grid');
          grid.innerHTML = '';

          const iconColors = ['primary', 'secondary', 'tertiary'];

          for (let i = 0; i < data.data.length; i++) {
            const model = data.data[i];
            const iconColor = iconColors[i % 3];
            const isFree = model.verified_anonymous;
            const isDisabled = disabledModels.has(model.id);

            const card = document.createElement('div');
            card.className = `bg-surface-container border border-outline-variant/10 rounded-xl p-md flex flex-col gap-sm hover:border-primary/30 transition-all group ${isDisabled ? 'opacity-50' : ''}`;
            card.dataset.modelId = model.id;

            card.innerHTML = `
              <div class="flex justify-between items-start">
                <div class="flex items-center gap-2">
                  <div class="p-2 rounded-lg bg-surface-container-high">
                    <span class="material-symbols-outlined text-${iconColor}">smart_toy</span>
                  </div>
                  ${isFree ? '<span class="inline-flex items-center px-1.5 py-0.5 rounded text-[10px] font-bold tracking-wider bg-error/10 text-error border border-error/20">FREE</span>' : ''}
                </div>
                <div class="flex gap-xs">
                  <button class="p-1.5 rounded-md hover:bg-surface-variant text-on-surface-variant hover:text-primary transition-colors" onclick="copyModelName('${escapeHtml(model.id)}', event)">
                    <span class="material-symbols-outlined text-[20px]">content_copy</span>
                  </button>
                  <button class="p-1.5 rounded-md hover:bg-surface-variant text-on-surface-variant hover:text-secondary transition-colors" onclick="refreshModel('${escapeHtml(model.id)}', event)">
                    <span class="material-symbols-outlined text-[20px]">restart_alt</span>
                  </button>
                  ${!isFree ? `<button class="p-1.5 rounded-md hover:bg-surface-variant text-on-surface-variant hover:text-primary transition-colors" onclick="openAPIKeyModal('${escapeHtml(model.id)}')">
                    <span class="material-symbols-outlined text-[20px]">vpn_key</span>
                  </button>` : ''}
                </div>
              </div>
              <div>
                <h3 class="font-headline-md text-[20px] text-on-surface leading-tight model-name">${escapeHtml(model.id)}</h3>
                <p class="font-label-sm text-label-sm text-on-surface-variant mt-1">Owner: opencode-zen</p>
              </div>
              <div class="mt-2 space-y-xs">
                <div class="flex justify-between items-center py-1.5 border-b border-outline-variant/5">
                  <span class="font-label-md text-on-surface-variant">Context</span>
                  <span class="font-label-md text-on-surface font-semibold">${model.context_length.toLocaleString()}</span>
                </div>
                <div class="flex justify-between items-center py-1.5 border-b border-outline-variant/5">
                  <span class="font-label-md text-on-surface-variant">Max Output</span>
                  <span class="font-label-md text-on-surface font-semibold">${model.max_output.toLocaleString()}</span>
                </div>
              </div>
              <div class="mt-2 flex items-center justify-between">
                <div class="flex items-center gap-sm">
                  <button onclick="quickTest('${escapeHtml(model.id)}', this)" class="test-btn px-4 py-1.5 rounded-lg bg-primary/10 text-primary border border-primary/20 font-bold text-label-sm hover:bg-primary hover:text-on-primary transition-all flex items-center gap-1.5">
                    <span class="test-icon">Test</span>
                  </button>
                </div>
                <div class="flex items-center gap-2">
                  <label class="flex items-center cursor-pointer group">
                    <div class="relative">
                      <input ${isDisabled ? '' : 'checked'} class="sr-only peer model-toggle" type="checkbox" data-model="${escapeHtml(model.id)}" onchange="toggleModel('${escapeHtml(model.id)}', this)"/>
                      <div class="w-8 h-4 bg-surface-container-highest rounded-full border border-outline-variant/30 peer-checked:bg-secondary transition-colors"></div>
                      <div class="absolute left-0.5 top-0.5 w-3 h-3 bg-on-surface rounded-full transition-all peer-checked:translate-x-4 peer-checked:bg-on-secondary-fixed"></div>
                    </div>
                  </label>
                </div>
              </div>
            `;

            grid.appendChild(card);
          }
        } catch (err) {
          console.error('Failed to load models:', err);
        }
      }

      // Update statistics
      async function updateStats() {
        try {
          const res = await fetch('/api/stats');
          const stats = await res.json();

          document.getElementById('total-requests').textContent = stats.total_requests.toLocaleString();
          document.getElementById('avg-latency').textContent = Math.round(stats.avg_latency_ms) + 'ms';
          document.getElementById('total-tokens').textContent = stats.total_tokens.toLocaleString();
          document.getElementById('total-errors').textContent = stats.total_errors.toLocaleString();

          const tokensPerMin = stats.tokens_per_minute || 0;
          chartData.push(tokensPerMin);
          if (chartData.length > MAX_CHART_POINTS) {
            chartData.shift();
          }
          renderChart();

          updatePollInterval(tokensPerMin);
        } catch (err) {
          console.error('Failed to update stats:', err);
        }
      }

      // Render 16-bar vertical chart
      function renderChart() {
        const canvas = document.getElementById('chart');
        const ctx = canvas.getContext('2d');
        const width = canvas.width;
        const height = canvas.height;

        ctx.clearRect(0, 0, width, height);

        if (chartData.length === 0) return;

        const max = Math.max(...chartData, 1);
        const barWidth = width / MAX_CHART_POINTS;

        chartData.forEach((value, i) => {
          const barHeight = (value / max) * height;
          const x = i * barWidth;
          const y = height - barHeight;

          const gradient = ctx.createLinearGradient(0, y, 0, height);
          gradient.addColorStop(0, '#c0c1ff');
          gradient.addColorStop(1, '#4cd7f6');

          ctx.fillStyle = gradient;
          ctx.fillRect(x, y, barWidth - 2, barHeight);
        });
      }

      // Adaptive polling
      function updatePollInterval(tokensPerMin) {
        let newInterval;
        if (tokensPerMin > 1000) {
          newInterval = 5000;
        } else if (tokensPerMin > 100) {
          newInterval = 10000;
        } else {
          newInterval = 30000;
        }

        if (newInterval !== pollInterval) {
          pollInterval = newInterval;
          clearInterval(pollTimer);
          pollTimer = setInterval(updateStats, pollInterval);
        }
      }

      // Test modal functions
      function openTestModal(modelId) {
        document.getElementById('test-modal').classList.remove('hidden');
        document.getElementById('test-model').value = modelId;
        document.getElementById('test-prompt').value = '';
        document.getElementById('test-result').textContent = '';
      }

      function closeTestModal() {
        document.getElementById('test-modal').classList.add('hidden');
      }

      async function runTest() {
        const model = document.getElementById('test-model').value;
        const prompt = document.getElementById('test-prompt').value;
        const resultEl = document.getElementById('test-result');

        if (!prompt.trim()) {
          resultEl.textContent = 'Please enter a prompt';
          return;
        }

        resultEl.textContent = 'Testing...';

        try {
          const res = await fetch('/v1/chat/completions', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'X-CSRF-Token': csrfToken
            },
            body: JSON.stringify({
              model: model,
              messages: [{ role: 'user', content: prompt }]
            })
          });

          const data = await res.json();

          if (res.ok && data.choices && data.choices[0]) {
            resultEl.textContent = data.choices[0].message.content;
          } else {
            resultEl.textContent = 'Error: ' + (data.error?.message || 'Unknown error');
          }
        } catch (err) {
          resultEl.textContent = 'Request failed: ' + err.message;
        }
      }

      // Quick test function (inline, no modal)
      // Toggle model on/off
      function toggleModel(modelId, checkbox) {
        if (checkbox.checked) {
          // Enable model
          disabledModels.delete(modelId);
          const card = document.querySelector(`[data-model-id="${modelId}"]`);
          if (card) {
            card.classList.remove('opacity-50');
          }
          showToast(`${modelId} enabled`);
        } else {
          // Disable model
          disabledModels.add(modelId);
          const card = document.querySelector(`[data-model-id="${modelId}"]`);
          if (card) {
            card.classList.add('opacity-50');
          }
          showToast(`${modelId} disabled`);
        }

        // Save to localStorage
        localStorage.setItem('disabledModels', JSON.stringify([...disabledModels]));
      }

      async function quickTest(modelId, buttonEl) {
        // Check if model is disabled
        if (disabledModels.has(modelId)) {
          showToast(`${modelId} is disabled`, true);
          return;
        }

        const iconEl = buttonEl.querySelector('.test-icon');
        const originalContent = iconEl.innerHTML;

        // Show loading spinner
        iconEl.innerHTML = '<span class="material-symbols-outlined text-[16px] animate-spin">progress_activity</span>';
        buttonEl.disabled = true;
        buttonEl.classList.add('opacity-50', 'cursor-not-allowed');

        try {
          const res = await fetch(`/v1/${modelId}/chat/completions`, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'X-CSRF-Token': csrfToken
            },
            body: JSON.stringify({
              messages: [{ role: 'user', content: 'Hi' }]
            })
          });

          // If CSRF token expired, refresh and retry
          if (res.status === 403) {
            console.log('CSRF token expired, refreshing...');
            await fetchCSRFToken();

            // Retry with new token
            const retryRes = await fetch(`/v1/${modelId}/chat/completions`, {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'X-CSRF-Token': csrfToken
              },
              body: JSON.stringify({
                messages: [{ role: 'user', content: 'Hi' }]
              })
            });

            if (retryRes.ok) {
              const retryData = await retryRes.json();
              if (retryData.choices && retryData.choices[0]) {
                // Show success checkmark
                iconEl.innerHTML = '<span class="material-symbols-outlined text-[16px]">check_circle</span>';
                buttonEl.classList.remove('bg-primary/10', 'text-primary', 'border-primary/20');
                buttonEl.classList.add('bg-green-500/10', 'text-green-500', 'border-green-500/20');

                // Reset after 2 seconds
                setTimeout(() => {
                  iconEl.innerHTML = originalContent;
                  buttonEl.classList.remove('bg-green-500/10', 'text-green-500', 'border-green-500/20');
                  buttonEl.classList.add('bg-primary/10', 'text-primary', 'border-primary/20');
                  buttonEl.disabled = false;
                  buttonEl.classList.remove('opacity-50', 'cursor-not-allowed');
                }, 2000);
                return;
              }
            }

            // If retry also failed, show error
            throw new Error('CSRF token refresh failed');
          }

          const data = await res.json();

          if (res.ok && data.choices && data.choices[0]) {
            // Show success checkmark
            iconEl.innerHTML = '<span class="material-symbols-outlined text-[16px]">check_circle</span>';
            buttonEl.classList.remove('bg-primary/10', 'text-primary', 'border-primary/20');
            buttonEl.classList.add('bg-green-500/10', 'text-green-500', 'border-green-500/20');

            // Reset after 2 seconds
            setTimeout(() => {
              iconEl.innerHTML = originalContent;
              buttonEl.classList.remove('bg-green-500/10', 'text-green-500', 'border-green-500/20', 'opacity-50', 'cursor-not-allowed');
              buttonEl.classList.add('bg-primary/10', 'text-primary', 'border-primary/20');
              buttonEl.disabled = false;
            }, 2000);
          } else {
            // Show error
            iconEl.innerHTML = '<span class="material-symbols-outlined text-[16px]">error</span>';
            buttonEl.classList.remove('bg-primary/10', 'text-primary', 'border-primary/20');
            buttonEl.classList.add('bg-error/10', 'text-error', 'border-error/20');

            // Reset after 2 seconds
            setTimeout(() => {
              iconEl.innerHTML = originalContent;
              buttonEl.classList.remove('bg-error/10', 'text-error', 'border-error/20', 'opacity-50', 'cursor-not-allowed');
              buttonEl.classList.add('bg-primary/10', 'text-primary', 'border-primary/20');
              buttonEl.disabled = false;
            }, 2000);
          }
        } catch (err) {
          // Show error
          iconEl.innerHTML = '<span class="material-symbols-outlined text-[16px]">error</span>';
          buttonEl.classList.remove('bg-primary/10', 'text-primary', 'border-primary/20');
          buttonEl.classList.add('bg-error/10', 'text-error', 'border-error/20');

          // Reset after 2 seconds
          setTimeout(() => {
            iconEl.innerHTML = originalContent;
            buttonEl.classList.remove('bg-error/10', 'text-error', 'border-error/20', 'opacity-50', 'cursor-not-allowed');
            buttonEl.classList.add('bg-primary/10', 'text-primary', 'border-primary/20');
            buttonEl.disabled = false;
          }, 2000);
        }
      }

      // API Key modal functions
      let currentAPIKeyModel = null;

      function openAPIKeyModal(modelId) {
        currentAPIKeyModel = modelId;
        document.getElementById('api-key-modal').classList.remove('hidden');
        document.getElementById('api-key-name').value = modelId;
        document.getElementById('api-key-input').value = '';
        document.getElementById('api-key-priority').value = '1';

        // Check if key exists
        fetch(`/api/models/${encodeURIComponent(modelId)}/key`)
          .then(res => res.json())
          .then(data => {
            if (data.exists) {
              document.getElementById('api-key-input').placeholder = '••••••••••••••••';
            }
          });
      }

      function closeAPIKeyModal() {
        document.getElementById('api-key-modal').classList.add('hidden');
        currentAPIKeyModel = null;
      }

      async function checkAPIKey() {
        const key = document.getElementById('api-key-input').value;
        if (!key.trim()) {
          alert('Please enter an API key');
          return;
        }
        alert('API key format looks valid');
      }

      async function saveAPIKey() {
        const key = document.getElementById('api-key-input').value;

        if (!key.trim()) {
          alert('Please enter an API key');
          return;
        }

        try {
          const res = await fetch(`/api/models/${encodeURIComponent(currentAPIKeyModel)}/key`, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'X-CSRF-Token': csrfToken
            },
            body: JSON.stringify({ key: key })
          });

          if (res.ok) {
            closeAPIKeyModal();
            alert('API key saved successfully');
          } else {
            alert('Failed to save API key');
          }
        } catch (err) {
          alert('Request failed: ' + err.message);
        }
      }

      // Copy model name
      // Refresh model status and card
      async function refreshModel(modelId, event) {
        const button = event?.target.closest('button');
        const card = button?.closest('.bg-surface-container');

        if (button) {
          const icon = button.querySelector('.material-symbols-outlined');
          icon.classList.add('animate-spin');
        }

        try {
          // Test model availability with quick request
          let res = await fetch(`/v1/${modelId}/chat/completions`, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'X-CSRF-Token': csrfToken
            },
            body: JSON.stringify({
              messages: [{ role: 'user', content: 'ping' }],
              max_tokens: 5
            })
          });

          // If CSRF token expired, refresh and retry
          if (res.status === 403) {
            console.log('CSRF token expired, refreshing...');
            await fetchCSRFToken();

            // Retry with new token
            res = await fetch(`/v1/${modelId}/chat/completions`, {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'X-CSRF-Token': csrfToken
              },
              body: JSON.stringify({
                messages: [{ role: 'user', content: 'ping' }],
                max_tokens: 5
              })
            });
          }

          // Update card visual feedback based on status
          if (card) {
            if (res.ok) {
              // Success - flash green border
              card.style.borderColor = 'rgb(var(--secondary))';
              setTimeout(() => {
                card.style.borderColor = '';
              }, 1500);
              showToast(`${modelId} is available`);
            } else {
              // Error - flash red border
              card.style.borderColor = 'rgb(var(--error))';
              setTimeout(() => {
                card.style.borderColor = '';
              }, 1500);
              showToast(`${modelId} unavailable`, true);
            }
          }

          // Reload stats to get fresh data
          await updateStats();

        } catch (err) {
          console.error('Refresh failed:', err);
          if (card) {
            card.style.borderColor = 'rgb(var(--error))';
            setTimeout(() => {
              card.style.borderColor = '';
            }, 1500);
          }
          showToast('Refresh failed', true);
        } finally {
          if (button) {
            const icon = button.querySelector('.material-symbols-outlined');
            icon.classList.remove('animate-spin');
          }
        }
      }

      function copyModelName(modelName, event) {
        navigator.clipboard.writeText(modelName).then(() => {
          // Visual feedback - change icon temporarily
          const button = event?.target.closest('button');
          if (button) {
            const icon = button.querySelector('.material-symbols-outlined');
            const originalIcon = icon.textContent;
            icon.textContent = 'check';
            icon.classList.add('text-secondary');

            setTimeout(() => {
              icon.textContent = originalIcon;
              icon.classList.remove('text-secondary');
            }, 1500);
          }

          // Show toast notification
          showToast(`Copied: ${modelName}`);
        }).catch(err => {
          console.error('Failed to copy:', err);
          showToast('Failed to copy', true);
        });
      }

      // Toast notification
      function showToast(message, isError = false) {
        const toast = document.createElement('div');
        toast.className = `fixed bottom-20 left-1/2 -translate-x-1/2 px-4 py-2 rounded-lg ${isError ? 'bg-error text-on-error' : 'bg-secondary text-on-secondary'} font-label-md shadow-lg z-50 animate-fade-in`;
        toast.textContent = message;
        document.body.appendChild(toast);

        setTimeout(() => {
          toast.style.opacity = '0';
          toast.style.transition = 'opacity 0.3s';
          setTimeout(() => toast.remove(), 300);
        }, 2000);
      }

      // XSS protection
      function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
      }

      // Initialize
      async function init() {
        await fetchCSRFToken();
        await loadModels();
        await updateStats();
        pollTimer = setInterval(updateStats, pollInterval);
      }

      init();
    </script>
</body>
