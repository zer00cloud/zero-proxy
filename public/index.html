<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>ProxyZero Dashboard</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Geist:wght@400;500;600&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "surface-dim": "#12131a",
                        "surface-bright": "#383941",
                        "surface-tint": "#c0c1ff",
                        "primary-fixed": "#e1e0ff",
                        "on-primary": "#1000a9",
                        "surface": "#12131a",
                        "surface-container-lowest": "#0d0e15",
                        "surface-container-highest": "#33343c",
                        "inverse-primary": "#494bd6",
                        "secondary-fixed": "#acedff",
                        "on-error": "#690005",
                        "surface-variant": "#33343c",
                        "secondary-fixed-dim": "#4cd7f6",
                        "outline": "#908fa0",
                        "outline-variant": "#464554",
                        "primary-container": "#8083ff",
                        "surface-container": "#1e1f26",
                        "secondary": "#4cd7f6",
                        "surface-container-high": "#292931",
                        "primary": "#c0c1ff",
                        "background": "#12131a",
                        "on-surface": "#e3e1ec",
                        "on-secondary-container": "#00424e",
                        "surface-container-low": "#1a1b22",
                        "error": "#ffb4ab",
                        "secondary-container": "#03b5d3",
                        "on-background": "#e3e1ec",
                        "inverse-on-surface": "#2f3038",
                        "on-primary-container": "#0d0096",
                        "on-surface-variant": "#c7c4d7",
                        "error-container": "#93000a",
                        "on-secondary": "#003640",
                        "primary-fixed-dim": "#c0c1ff",
                        "on-error-container": "#ffdad6",
                        "inverse-surface": "#e3e1ec"
                    }
                }
            }
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .chart-gradient {
            background: linear-gradient(180deg, rgba(192, 193, 255, 0.1) 0%, rgba(192, 193, 255, 0) 100%);
        }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col">
    <!-- Header -->
    <header class="bg-surface-container border-b border-outline-variant/10 sticky top-0 z-50">
        <div class="flex justify-between items-center w-full px-6 h-16 max-w-7xl mx-auto">
            <div class="text-2xl font-bold text-primary">ProxyZero</div>
            <div class="flex items-center gap-4">
                <span id="polling-indicator" class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full bg-secondary-container/20 text-secondary text-xs font-semibold">
                    <span class="w-1.5 h-1.5 rounded-full bg-secondary animate-pulse"></span>
                    <span id="polling-text">Live (10s)</span>
                </span>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 overflow-y-auto p-6 bg-background">
        <div class="mx-auto space-y-6 max-w-7xl">
            <!-- Stats Cards -->
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <div class="bg-surface-container border border-outline-variant/10 rounded-xl p-4">
                    <div class="text-on-surface-variant text-sm">Total Requests</div>
                    <div id="stat-total-requests" class="text-3xl font-bold text-primary mt-2">0</div>
                </div>
                <div class="bg-surface-container border border-outline-variant/10 rounded-xl p-4">
                    <div class="text-on-surface-variant text-sm">Requests/min</div>
                    <div id="stat-requests-per-min" class="text-3xl font-bold text-secondary mt-2">0</div>
                </div>
                <div class="bg-surface-container border border-outline-variant/10 rounded-xl p-4">
                    <div class="text-on-surface-variant text-sm">Avg Latency</div>
                    <div id="stat-avg-latency" class="text-3xl font-bold text-primary mt-2">0ms</div>
                </div>
                <div class="bg-surface-container border border-outline-variant/10 rounded-xl p-4">
                    <div class="text-on-surface-variant text-sm">Errors</div>
                    <div id="stat-errors" class="text-3xl font-bold text-error mt-2">0</div>
                </div>
            </div>

            <!-- 16-Model Vertical Chart -->
            <section class="bg-surface-container-low border border-outline-variant/10 rounded-xl overflow-hidden">
                <div class="px-6 py-4 border-b border-outline-variant/10">
                    <h2 class="text-xl font-semibold text-on-surface">Model Usage Distribution</h2>
                    <p class="text-sm text-on-surface-variant">Request count per model (16 models)</p>
                </div>
                <div class="p-6 h-64 relative">
                    <div id="model-chart" class="absolute inset-x-6 bottom-6 top-6 flex items-end justify-between gap-1">
                        <!-- Chart bars will be inserted here -->
                    </div>
                    <div class="absolute inset-0 chart-gradient pointer-events-none"></div>
                </div>
            </section>

            <!-- Model Cards -->
            <div id="models-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                <!-- Model cards will be inserted here -->
            </div>
        </div>
    </main>

    <!-- Test Modal -->
    <div id="test-modal" class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="bg-surface-container border border-outline-variant/10 rounded-xl max-w-2xl w-full max-h-[90vh] overflow-y-auto">
            <div class="px-6 py-4 border-b border-outline-variant/10 flex justify-between items-center">
                <h3 class="text-xl font-semibold text-on-surface">Test Model: <span id="modal-model-name"></span></h3>
                <button id="modal-close" class="p-2 hover:bg-surface-variant rounded-lg transition-colors">
                    <span class="material-symbols-outlined text-on-surface-variant">close</span>
                </button>
            </div>
            <div class="p-6 space-y-4">
                <div>
                    <label class="block text-sm font-medium text-on-surface-variant mb-2">Your Prompt</label>
                    <textarea id="test-prompt" class="w-full px-4 py-3 bg-surface-container-high border border-outline-variant/20 rounded-lg text-on-surface focus:border-primary focus:ring-1 focus:ring-primary outline-none resize-none" rows="4" placeholder="Hello, who are you?">Hello, who are you?</textarea>
                </div>
                <button id="test-submit" class="w-full py-3 rounded-lg bg-primary text-on-primary font-bold hover:opacity-90 active:scale-95 transition-all">
                    Send Request
                </button>
                <div id="test-loading" class="hidden text-center text-on-surface-variant">
                    <span class="inline-block animate-spin material-symbols-outlined">progress_activity</span>
                    <span class="ml-2">Sending request...</span>
                </div>
                <div id="test-response" class="hidden">
                    <label class="block text-sm font-medium text-on-surface-variant mb-2">Response</label>
                    <div id="test-response-content" class="px-4 py-3 bg-surface-container-high border border-outline-variant/20 rounded-lg text-on-surface whitespace-pre-wrap"></div>
                </div>
                <div id="test-error" class="hidden px-4 py-3 bg-error-container/20 border border-error/20 rounded-lg text-error"></div>
            </div>
        </div>
    </div>

    <script>
        // CSRF token
        let csrfToken = null;

        // Fetch CSRF token from server
        async function fetchCSRFToken() {
            try {
                const res = await fetch('/api/csrf-token');
                const data = await res.json();
                csrfToken = data.token;
            } catch (err) {
                console.error('Failed to fetch CSRF token:', err);
            }
        }

        // Adaptive polling state
        let pollInterval = 10000; // Default 10s
        let statsTimer = null;

        // Load models on page load
        async function loadModels() {
            try {
                const res = await fetch('/v1/models');
                const data = await res.json();
                renderModelCards(data.data);
            } catch (err) {
                console.error('Failed to load models:', err);
            }
        }

        // Render model cards
        function renderModelCards(models) {
            const container = document.getElementById('models-container');
            container.innerHTML = '';

            models.forEach(model => {
                const card = document.createElement('div');
                card.className = 'bg-surface-container border border-outline-variant/10 rounded-xl p-6 flex flex-col gap-4 hover:border-primary/30 transition-all';

                const isFree = model.verified_anonymous;

                card.innerHTML = `
                    <div class="flex justify-between items-start">
                        <div class="flex items-center gap-2">
                            <div class="p-2 rounded-lg bg-surface-container-high">
                                <span class="material-symbols-outlined text-primary">smart_toy</span>
                            </div>
                            ${isFree ? '<span class="inline-flex items-center px-1.5 py-0.5 rounded text-[10px] font-bold tracking-wider bg-secondary/10 text-secondary border border-secondary/20">FREE</span>' : ''}
                        </div>
                    </div>
                    <div>
                        <h3 class="text-lg font-semibold text-on-surface leading-tight">${escapeHtml(model.id)}</h3>
                        <p class="text-sm text-on-surface-variant mt-1">Owner: ${escapeHtml(model.owned_by)}</p>
                    </div>
                    <div class="space-y-2">
                        <div class="flex justify-between items-center py-1.5 border-b border-outline-variant/5">
                            <span class="text-sm text-on-surface-variant">Context</span>
                            <span class="text-sm text-on-surface font-semibold">${model.context_length.toLocaleString()}</span>
                        </div>
                        <div class="flex justify-between items-center py-1.5 border-b border-outline-variant/5">
                            <span class="text-sm text-on-surface-variant">Max Output</span>
                            <span class="text-sm text-on-surface font-semibold">${model.max_output.toLocaleString()}</span>
                        </div>
                    </div>
                    ${!isFree ? `
                    <div class="space-y-2">
                        <label class="block text-sm font-medium text-on-surface-variant">API Key</label>
                        <div class="flex gap-2">
                            <input type="password" id="key-${escapeHtml(model.id)}" class="flex-1 px-3 py-2 bg-surface-container-high border border-outline-variant/20 rounded-lg text-on-surface text-sm focus:border-primary focus:ring-1 focus:ring-primary outline-none" placeholder="Enter API key">
                            <button onclick="saveAPIKey('${escapeHtml(model.id)}')" class="px-4 py-2 rounded-lg bg-primary text-on-primary text-sm font-bold hover:opacity-90 active:scale-95 transition-all">
                                Save
                            </button>
                        </div>
                    </div>
                    ` : ''}
                    <button onclick="openTestModal('${escapeHtml(model.id)}')" class="w-full py-2.5 rounded-lg bg-primary text-on-primary font-bold hover:opacity-90 active:scale-95 transition-all">
                        Test
                    </button>
                `;

                container.appendChild(card);
            });

            // Load saved API keys
            loadAPIKeys(models);
        }

        // Escape HTML to prevent XSS
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Load saved API keys
        async function loadAPIKeys(models) {
            for (const model of models) {
                if (!model.verified_anonymous) {
                    try {
                        const res = await fetch(`/api/models/${encodeURIComponent(model.id)}/key`);
                        const data = await res.json();
                        if (data.exists) {
                            const input = document.getElementById(`key-${model.id}`);
                            if (input) {
                                input.value = '••••••••';
                                input.dataset.saved = 'true';
                            }
                        }
                    } catch (err) {
                        console.error(`Failed to check key for ${model.id}:`, err);
                    }
                }
            }
        }

        // Save API key
        async function saveAPIKey(modelId) {
            const input = document.getElementById(`key-${modelId}`);
            const key = input.value;

            if (!key || key === '••••••••') {
                alert('Please enter a valid API key');
                return;
            }

            try {
                const res = await fetch(`/api/models/${encodeURIComponent(modelId)}/key`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ key })
                });

                if (res.ok) {
                    input.value = '••••••••';
                    input.dataset.saved = 'true';
                    alert('API key saved successfully');
                } else {
                    alert('Failed to save API key');
                }
            } catch (err) {
                console.error('Failed to save API key:', err);
                alert('Failed to save API key');
            }
        }

        // Update statistics
        async function updateStats() {
            try {
                const res = await fetch('/api/stats');
                const stats = await res.json();

                // Update stat cards
                document.getElementById('stat-total-requests').textContent = stats.total_requests.toLocaleString();
                document.getElementById('stat-requests-per-min').textContent = stats.requests_per_minute;
                document.getElementById('stat-avg-latency').textContent = stats.avg_latency_ms + 'ms';
                document.getElementById('stat-errors').textContent = stats.error_count;

                // Update 16-model chart
                render16ModelChart(stats.model_stats);

                // Adaptive polling
                const tokensPerMin = stats.tokens_per_minute;
                let newInterval;
                if (tokensPerMin > 100) {
                    newInterval = 5000;
                } else if (tokensPerMin > 10) {
                    newInterval = 10000;
                } else {
                    newInterval = 30000;
                }

                if (newInterval !== pollInterval) {
                    pollInterval = newInterval;
                    clearInterval(statsTimer);
                    statsTimer = setInterval(updateStats, pollInterval);

                    // Update indicator
                    const seconds = pollInterval / 1000;
                    document.getElementById('polling-text').textContent = `Live (${seconds}s)`;
                }
            } catch (err) {
                console.error('Failed to update stats:', err);
            }
        }

        // Render 16-model vertical chart
        function render16ModelChart(modelStats) {
            const container = document.getElementById('model-chart');
            container.innerHTML = '';

            if (!modelStats || modelStats.length === 0) {
                container.innerHTML = '<div class="text-center text-on-surface-variant">No data yet</div>';
                return;
            }

            // Ensure we have exactly 16 bars (pad with zeros if needed)
            const allModels = [
                'minimax-m2.5-free', 'big-pickle', 'nemotron-3-super-free',
                'glm-4-flash', 'deepseek-chat', 'qwen-2.5-72b-instruct',
                'llama-3.3-70b-instruct', 'gemma-2-27b-it', 'mistral-large-2411',
                'phi-4', 'qwen-qwq-32b-preview', 'deepseek-r1-distill-llama-70b',
                'marco-o1', 'skywork-o1-open-llama-3.1-8b', 'llama-3.1-nemotron-70b-instruct',
                'qwen-2.5-coder-32b-instruct'
            ];

            const modelMap = {};
            modelStats.forEach(stat => {
                modelMap[stat.model] = stat.count;
            });

            const counts = allModels.map(model => modelMap[model] || 0);
            const maxCount = Math.max(...counts, 1);

            allModels.forEach((model, index) => {
                const count = counts[index];
                const height = (count / maxCount) * 100;
                const isFree = ['minimax-m2.5-free', 'big-pickle', 'nemotron-3-super-free'].includes(model);
                const color = isFree ? 'bg-secondary' : 'bg-primary/40';

                const bar = document.createElement('div');
                bar.className = `flex-1 ${color} rounded-t-sm transition-all duration-500`;
                bar.style.height = `${height}%`;
                bar.title = `${model}: ${count} requests`;

                container.appendChild(bar);
            });
        }

        // Open test modal
        function openTestModal(modelId) {
            document.getElementById('modal-model-name').textContent = modelId;
            document.getElementById('test-modal').classList.remove('hidden');
            document.getElementById('test-prompt').focus();
            document.getElementById('test-modal').dataset.modelId = modelId;

            // Reset modal state
            document.getElementById('test-response').classList.add('hidden');
            document.getElementById('test-error').classList.add('hidden');
        }

        // Close test modal
        document.getElementById('modal-close').addEventListener('click', () => {
            document.getElementById('test-modal').classList.add('hidden');
        });

        // Close modal on backdrop click
        document.getElementById('test-modal').addEventListener('click', (e) => {
            if (e.target.id === 'test-modal') {
                document.getElementById('test-modal').classList.add('hidden');
            }
        });

        // Close modal on Escape key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                document.getElementById('test-modal').classList.add('hidden');
            }
        });

        // Submit test request
        document.getElementById('test-submit').addEventListener('click', async () => {
            const modelId = document.getElementById('test-modal').dataset.modelId;
            const prompt = document.getElementById('test-prompt').value;

            if (!prompt.trim()) {
                alert('Please enter a prompt');
                return;
            }

            // Show loading
            document.getElementById('test-loading').classList.remove('hidden');
            document.getElementById('test-response').classList.add('hidden');
            document.getElementById('test-error').classList.add('hidden');
            document.getElementById('test-submit').disabled = true;

            try {
                const res = await fetch('/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRF-Token': csrfToken
                    },
                    body: JSON.stringify({
                        model: modelId,
                        messages: [{ role: 'user', content: prompt }]
                    })
                });

                const data = await res.json();

                if (res.ok && data.choices && data.choices[0]) {
                    // XSS-safe rendering using textContent
                    const responseContent = data.choices[0].message.content;
                    document.getElementById('test-response-content').textContent = responseContent;
                    document.getElementById('test-response').classList.remove('hidden');
                } else {
                    // XSS-safe error rendering
                    const errorMsg = data.error?.message || 'Unknown error';
                    document.getElementById('test-error').textContent = errorMsg;
                    document.getElementById('test-error').classList.remove('hidden');
                }
            } catch (err) {
                // XSS-safe error rendering
                document.getElementById('test-error').textContent = err.message;
                document.getElementById('test-error').classList.remove('hidden');
            } finally {
                document.getElementById('test-loading').classList.add('hidden');
                document.getElementById('test-submit').disabled = false;
            }
        });

        // Initialize
        async function init() {
            await fetchCSRFToken();
            loadModels();
            updateStats();
            statsTimer = setInterval(updateStats, pollInterval);
        }

        init();
    </script>
</body>
</html>
